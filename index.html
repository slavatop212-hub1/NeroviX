<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NeroviX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1f;
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    button {
      background: #00aaff;
      border: none;
      padding: 12px 20px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    form {
      margin-top: 40px;
      display: none;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>NeroviX</h1>
  <p>Команда цифровых проектов. Создаём ботов, системы и контент.</p>

  <button onclick="openForm()">Вступить в команду</button>

  <form id="form">
    <input type="text" id="name" placeholder="Имя">
    <input type="text" id="tg" placeholder="Telegram (@username)">
    <input type="text" id="role" placeholder="Роль (монтажёр, кодер и т.д)">
    <button type="button" onclick="send()">Отправить</button>
  </form>
</div>

<script>
const ENDPOINT_URL = "https://super-voice-25ca.slavatop212.workers.dev/";

function openForm() {
  document.getElementById("form").style.display = "flex";
}

async function send() {
  const data = {
    name: document.getElementById("name").value.trim(),
    tg: document.getElementById("tg").value.trim(),
    role: document.getElementById("role").value.trim()
  };

  if (!data.name || !data.tg || !data.role) {
    alert("Заполни все поля");
    return;
  }

  try {
    const res = await fetch(ENDPOINT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error();

    alert("Заявка отправлена 🚀");

    // очистка формы
    document.getElementById("name").value = "";
    document.getElementById("tg").value = "";
    document.getElementById("role").value = "";

  } catch (e) {
    alert("Ошибка отправки ❌");
  }
}
</script>

</body>
</html>
