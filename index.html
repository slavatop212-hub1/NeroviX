<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NeroviX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1f;
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    button {
      background: #00aaff;
      border: none;
      padding: 12px 20px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    form {
      margin-top: 40px;
      display: none;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>NeroviX</h1>
  <p>Команда цифровых проектов. Создаём ботов, системы и контент.</p>

  <button onclick="openForm()">Вступить в команду</button>

  <form id="form">
    <input type="text" id="name" placeholder="Имя">
    <input type="text" id="tg" placeholder="Telegram">
    <input type="text" id="role" placeholder="Роль">
    <button type="button" onclick="send()">Отправить</button>
  </form>
</div>

<script>
function openForm() {
  document.getElementById("form").style.display = "flex";
}

function send() {
  alert("Заявка отправлена (пока без ТГ)");
}
</script>

</body>
</html>
